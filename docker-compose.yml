services:
  postgres:
    image: postgres:16-alpine
    container_name: netchex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: netchex
      POSTGRES_PASSWORD: netchex_dev
      POSTGRES_DB: netchex_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netchex -d netchex_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment below to run the full app via Docker
